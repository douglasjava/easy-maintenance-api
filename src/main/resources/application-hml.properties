# ============ PROFILE LOCAL ============
spring.application.name=easy_maintenance

easy.jwt.secret=${JWT_SECRET}
easy.jwt.expirationSeconds=3600

# ============ DATASOURCE (MySQL Docker) ============
easy.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
easy.datasource.username=${MYSQLUSER}
easy.datasource.password=${MYSQLPASSWORD}
easy.datasource.drive=com.mysql.cj.jdbc.Driver

# ============ JPA/Hibernate ============
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============ Flyway ============
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# spring.flyway.clean-disabled=false

# ============ Jackson / Timezone ============
spring.jackson.time-zone=UTC

# ============ Swagger / Actuator (opcional) ============
management.endpoints.web.exposure.include=health,info,prometheus,metrics

# ============ Cache (Caffeine) ============
# habilita cache com Caffeine no profile local
spring.cache.type=caffeine
# nome do cache usado no @Cacheable
spring.cache.cache-names=suppliersNearby
# TTL 24h e limite de itens
spring.cache.caffeine.spec=expireAfterWrite=24h,maximumSize=1000

# ============ asaas (Gateway de pagamento) ============
asaas.api-key=${ASAAS_API_KEY}
asaas.base-url=https://sandbox.asaas.com/api/v3
asaas.checkout-success-url=https://easy-maintenance-web-production.up.railway.app/checkout/success
asaas.checkout-cancel-url=https://easy-maintenance-web-production.up.railway.app/checkout/cancel
asaas.checkout-expired-url=https://easy-maintenance-web-production.up.railway.app/checkout/exp
asaas.checkout-minutes-to-expire=120
asaas.webhook-token=${WEBHOOK-TOKEN}

# ============ Dashboard (AI opcional) ============
dashboard.ai.enabled=false
# TTL do cache do bloco de AI (ISO-8601 Duration)
dashboard.ai.cache-ttl=PT15M