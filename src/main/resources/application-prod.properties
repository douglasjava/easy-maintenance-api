# === Swagger — desabilitado em produção (TASK-005) ===
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# === Actuator — restrito em produção (TASK-011) ===
# Apenas health (público) e prometheus (requer autenticação) expostos
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,prometheus

# === CORS — origens permitidas em produção (TASK-014) ===
# Configurar ALLOWED_ORIGINS no Railway com o domínio real do frontend
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://app.easymaintenance.com.br}
