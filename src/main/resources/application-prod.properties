# === Swagger Disabled in Production (TASK-005) ===
# Disable API documentation endpoints in production for security reasons
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# === Actuator Restricted in Production (TASK-011) ===
# Expose only essential endpoints:
# - health: public (no details exposed)
# - prometheus: requires authentication
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,prometheus

# === CORS Allowed Origins in Production (TASK-014) ===
# Define allowed frontend domains via environment variable (Railway)
# Fallback defaults to the official production domain
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://www.easymaintenance.com.br}

# Cookie domain in production must restrict to the official domain so the browser
# shares the HttpOnly cookie across all subdomains (api.*, www.*, etc.).
app.cookie.domain=${COOKIE_DOMAIN:easymaintenance.com.br}

# In production the frontend and API share the same registered domain \u2192 Lax is safe and stricter.
app.cookie.same-site=Lax

# ============ DATASOURCE (MySQL Docker) ============
easy.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
easy.datasource.username=${MYSQLUSER}
easy.datasource.password=${MYSQLPASSWORD}
easy.datasource.drive=com.mysql.cj.jdbc.Driver


# ============ asaas (Gateway de pagamento) ============
asaas.api-key=${ASAAS_API_KEY}
asaas.base-url=https://asaas.com/api/v3
asaas.checkout-success-url=https://www.easymaintenance.com.br/checkout/success
asaas.checkout-cancel-url=https://www.easymaintenance.com.br/checkout/cancel
asaas.checkout-expired-url=https://www.easymaintenance.com.br/checkout/exp
asaas.checkout-minutes-to-expire=1440
asaas.webhook-token=${WEBHOOK-TOKEN}

# === AWS ===
aws.s3.bucket=easy-maintenance-prod

# ============ Dashboard (AI opcional) ============
dashboard.ai.enabled=false
# TTL do cache do bloco de AI (ISO-8601 Duration)
dashboard.ai.cache-ttl=PT15M


# ============ Cache (Caffeine) ============
# habilita cache com Caffeine no profile local
spring.cache.type=caffeine
# nome do cache usado no @Cacheable
spring.cache.cache-names=suppliersNearby
# TTL 24h e limite de itens
spring.cache.caffeine.spec=expireAfterWrite=24h,maximumSize=1000

# === Frontend ===
frontend.reset-password-url=https://www.easymaintenance.com.br/reset-password
frontend.login-url=https://www.easymaintenance.com.br/login