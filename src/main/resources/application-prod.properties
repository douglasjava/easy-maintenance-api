# === Swagger Disabled in Production (TASK-005) ===
# Disable API documentation endpoints in production for security reasons
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# === Actuator Restricted in Production (TASK-011) ===
# Expose only essential endpoints:
# - health: public (no details exposed)
# - prometheus: requires authentication
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,prometheus

# === CORS Allowed Origins in Production (TASK-014) ===
# Define allowed frontend domains via environment variable (Railway)
# Fallback defaults to the official production domain
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://www.easymaintenance.com.br}
