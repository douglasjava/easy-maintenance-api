# ============ PROFILE LOCAL ============
spring.application.name=easy_maintenance

easy.jwt.secret=${JWT_SECRET}
easy.jwt.expirationSeconds=3600

# === Logging ===
logging.pattern.console="%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level requestId=%X{requestId:-N/A} orgId=%X{orgId:-N/A} %logger{36} - %msg%n
logging.level.net.javacrumbs.shedlock=INFO

# === Spring AI / OpenAI ===
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# === Spring AI / DeepSeek ===
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.base-url=https://api.deepseek.com
spring.ai.chat.options.model=deepseek-chat
spring.ai.chat.options.temperature=0.2
spring.ai.chat.options.max-tokens=1200

# === Google ===
google.places.api-key=${GOOGLE_PLACES_API_KEY}
google.places.base-url=https://maps.googleapis.com/maps/api/place
google.places.default-radius-m=20000
google.places.max-results=5
google.places.details-enabled=false

# === Mailersend ===
mailersend.api-key=${MAILERSEND_API_KEY}
mailersend.base-url=https://api.mailersend.com/v1
mailersend.from-email=comercial@easymaintenance.com.br
mailersend.from-name=Easy Maintenance

# === WhatsApp Business (Meta Cloud API) — TASK-129 / EPIC-015 ===
whatsapp.base-url=https://graph.facebook.com/v21.0
whatsapp.api-token=${WHATSAPP_API_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.waba-id=${WHATSAPP_WABA_ID:}
whatsapp.default-template-name=${WHATSAPP_TEMPLATE_NAME:vencimento_manutencao}

# Orquestração do canal WhatsApp — TASK-130:
# - urgent-threshold-hours: NEAR_DUE só inclui WHATSAPP dentro desse limiar (arredondado para
#   dias inteiros, ver NotificationChannelResolver); OVERDUE sempre inclui, independente do valor.
# - fallback-to-email: dispara e-mail quando o envio de WhatsApp falha permanentemente e e-mail
#   não estava já no conjunto de canais resolvido para o evento.
notification.whatsapp.urgent-threshold-hours=48
notification.whatsapp.fallback-to-email=true


# === AWS ===
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.region=us-east-2
aws.s3.upload.max-file-size-mb=10

# === AI Jobs (async processing) ===
ai.job.timeout-seconds=60

# === Access Admin ===
bootstrap.admin.token=${BOOTSTRAP_ADMIN_TOKEN}

# === FIREBASE ===
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT_JSON}

# === Actuator & Metrics ===
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=easy-maintenance
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99


#spring.flyway.ignore-migration-patterns="*:ignored"
spring.flyway.validate-on-migrate=true

# === Billing ===
billing.blocking.days-after-due=3

# === JWT RSA Keys ===
# Set JWT_RSA_PRIVATE_KEY and JWT_RSA_PUBLIC_KEY env vars with Base64-encoded DER keys.
# Run RsaKeyGenerator once to generate the values.
# If not set, an ephemeral key is generated on each startup (dev only ? NOT for production).
jwt.rsa.private-key=${JWT_RSA_PRIVATE_KEY:}
jwt.rsa.public-key=${JWT_RSA_PUBLIC_KEY:}

# === CORS Default Allowed Origins (Development) ===
# Used for local development and testing environments.
# In production, this configuration is overridden by application-prod.properties
# to restrict access only to trusted frontend domains.
app.cors.allowed-origins=http://localhost:3000,https://easy-maintenance-web-production.up.railway.app,https://www.easymaintenance.com.br

# Cookie domain \u2014 empty means no Domain attribute (cookie scoped to API host, works on Railway/local).
# Overridden per profile: prod sets easymaintenance.com.br via COOKIE_DOMAIN env var.
app.cookie.domain=

# SameSite=None required for cross-site Railway subdomains (up.railway.app is in the PSL).
# Production overrides to Lax because frontend and API share the same registered domain.
app.cookie.same-site=None

# === Rate Limiting (Bucket4j + Caffeine) ===
# login: 10 tentativas por IP por minuto
rate-limit.limits.login.capacity=10
rate-limit.limits.login.refill-period-seconds=60
rate-limit.limits.login.key=IP

# forgot-password: 3 tentativas por IP a cada 15 minutos
rate-limit.limits.forgot-password.capacity=3
rate-limit.limits.forgot-password.refill-period-seconds=900
rate-limit.limits.forgot-password.key=IP


# ai: 60 chamadas por usu\uFFFDrio por hora (limites plan-aware a implementar em vers?o futura)
rate-limit.limits.ai.capacity=60
rate-limit.limits.ai.refill-period-seconds=3600
rate-limit.limits.ai.key=USER_ID

# === Resilience4j Circuit Breaker Configuration ===
# Protects external integration (Asaas) against instability and cascading failures.
# - Evaluates last 10 calls (sliding window)
# - Opens circuit if failure rate ? 50%
# - Keeps circuit open for 30s before transitioning to half-open (retry phase)
resilience4j.circuitbreaker.instances.asaas.sliding-window-size=10
resilience4j.circuitbreaker.instances.asaas.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.asaas.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.asaas.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.asaas.register-health-indicator=true

# AI: janela de 5 chamadas (volume menor), aguarda 60s no estado OPEN
resilience4j.circuitbreaker.instances.ai.sliding-window-size=5
resilience4j.circuitbreaker.instances.ai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ai.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.ai.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.ai.register-health-indicator=true

# === Sentry Error Tracking Configuration ===
# DSN empty ? Sentry is disabled (no-op). Set SENTRY_DSN_BACKEND in Railway to enable.
sentry.dsn=${SENTRY_DSN_BACKEND:}

# Do not send sensitive data (PII) such as tokens, passwords, or personal identifiers
sentry.send-default-pii=false

# Environment automatically derived from active Spring profile
sentry.environment=${SPRING_PROFILES_ACTIVE:local}

# Capture 10% of transactions for performance monitoring (tracing)
sentry.traces-sample-rate=0.1

# Capture only exceptions with ERROR level or higher
# (ensures noise reduction and focuses on critical issues)
sentry.exception-resolver-order=-2147483647


# === Resilience4j Retry Configuration ===
# MailerSend integration:
# - Maximum attempts: 3
# - Initial wait duration: 2 seconds
# - Exponential backoff enabled (2s ? 4s ? 8s)
resilience4j.retry.instances.mailersend.max-attempts=3
resilience4j.retry.instances.mailersend.wait-duration=2s
resilience4j.retry.instances.mailersend.enable-exponential-backoff=true
resilience4j.retry.instances.mailersend.exponential-backoff-multiplier=2

# WhatsApp (Meta Cloud API) integration — TASK-129:
# - Retry SELETIVO, ao contrário do mailersend acima: só falha transitória
#   (WhatsAppTransientException) tem retry. Falha permanente (WhatsAppPermanentException) nunca
#   é retentada (retry-exceptions restringe o retry só à exceção transitória).
resilience4j.retry.instances.whatsapp.max-attempts=3
resilience4j.retry.instances.whatsapp.wait-duration=2s
resilience4j.retry.instances.whatsapp.enable-exponential-backoff=true
resilience4j.retry.instances.whatsapp.exponential-backoff-multiplier=2
resilience4j.retry.instances.whatsapp.retry-exceptions=com.brainbyte.easy_maintenance.commons.exceptions.WhatsAppTransientException
resilience4j.retry.instances.whatsapp.ignore-exceptions=com.brainbyte.easy_maintenance.commons.exceptions.WhatsAppPermanentException

# ============ Jackson / Timezone ============
spring.jackson.time-zone=UTC

# ============ Flyway ============
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============ JPA/Hibernate ============
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============ Cache (Caffeine) ============
# habilita cache com Caffeine no profile local
spring.cache.type=caffeine
# nome do cache usado no @Cacheable
spring.cache.cache-names=suppliersNearby
# TTL 24h e limite de itens
spring.cache.caffeine.spec=expireAfterWrite=24h,maximumSize=1000

# ============ Dashboard (AI opcional) ============
dashboard.ai.enabled=false
# TTL do cache do bloco de AI (ISO-8601 Duration)
dashboard.ai.cache-ttl=PT15M

# === Frontend ===
frontend.base-url=http://localhost:3000