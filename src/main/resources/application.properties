# === Logging ===
logging.pattern.console="%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level requestId=%X{requestId:-N/A} orgId=%X{orgId:-N/A} %logger{36} - %msg%n
logging.level.net.javacrumbs.shedlock=INFO

# === Spring AI / OpenAI ===
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# === Spring AI / DeepSeek ===
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.base-url=https://api.deepseek.com
spring.ai.chat.options.model=deepseek-chat
spring.ai.chat.options.temperature=0.2
spring.ai.chat.options.max-tokens=1200

# === Google ===
google.places.api-key=${GOOGLE_PLACES_API_KEY}
google.places.base-url=https://maps.googleapis.com/maps/api/place
google.places.default-radius-m=20000
google.places.max-results=5
google.places.details-enabled=false

mailersend.api-key=${MAILERSEND_API_KEY}
mailersend.base-url=https://api.mailersend.com/v1
mailersend.from-email=no-reply@easymaintenance.com.br
mailersend.from-name=Easy Maintenance

# === Asaas ===
asaas.api-key=${ASAAS_API_KEY}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN}

# === Asaas Checkout (callbacks) ===
asaas.checkout-success-url=https://easy-maintenance-web-production.up.railway.app/checkout/success
asaas.checkout-cancel-url=https://easy-maintenance-web-production.up.railway.app/checkout/cancel
asaas.checkout-expired-url=https://easy-maintenance-web-production.up.railway.app/checkout/exp
asaas.checkout-minutes-to-expire=120

# === Google ===
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.region=us-east-2
aws.s3.bucket=easy-maintenance

# === Frontend ===
frontend.reset-password-url=https://app.easymaintenance.com/reset-password
frontend.login-url=https://app.easymaintenance.com/login

# === Access Admin ===
bootstrap.admin.token=${BOOTSTRAP_ADMIN_TOKEN}

# === FIREBASE ===
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT_JSON}




# === Actuator & Metrics ===
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=easy-maintenance
management.prometheus.metrics.export.enabled=true


#spring.flyway.ignore-migration-patterns="*:ignored"
spring.flyway.validate-on-migrate=false

# === Billing ===
billing.blocking.days-after-due=3

# === JWT RSA Keys ===
# Set JWT_RSA_PRIVATE_KEY and JWT_RSA_PUBLIC_KEY env vars with Base64-encoded DER keys.
# Run RsaKeyGenerator once to generate the values.
# If not set, an ephemeral key is generated on each startup (dev only — NOT for production).
jwt.rsa.private-key=${JWT_RSA_PRIVATE_KEY:}
jwt.rsa.public-key=${JWT_RSA_PUBLIC_KEY:}

# === CORS — origens padrão (dev). Em produção, sobrescrito por application-prod.properties ===
app.cors.allowed-origins=http://localhost:3000,https://easy-maintenance-web-production.up.railway.app

# === Rate Limiting (Bucket4j + Caffeine) ===
# login: 10 tentativas por IP por minuto
rate-limit.limits.login.capacity=10
rate-limit.limits.login.refill-period-seconds=60
rate-limit.limits.login.key=IP

# forgot-password: 3 tentativas por IP a cada 15 minutos
rate-limit.limits.forgot-password.capacity=3
rate-limit.limits.forgot-password.refill-period-seconds=900
rate-limit.limits.forgot-password.key=IP

# ai: 60 chamadas por usuário por hora (limites plan-aware a implementar em versão futura)
rate-limit.limits.ai.capacity=60
rate-limit.limits.ai.refill-period-seconds=3600
rate-limit.limits.ai.key=USER_ID

# === Resilience4j — Circuit Breakers ===
# Asaas: janela de 10 chamadas, abre com 50% de falha, aguarda 30s antes de tentar novamente
resilience4j.circuitbreaker.instances.asaas.sliding-window-size=10
resilience4j.circuitbreaker.instances.asaas.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.asaas.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.asaas.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.asaas.register-health-indicator=true

# AI: janela de 5 chamadas (volume menor), aguarda 60s no estado OPEN
resilience4j.circuitbreaker.instances.ai.sliding-window-size=5
resilience4j.circuitbreaker.instances.ai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ai.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.ai.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.ai.register-health-indicator=true

# === Sentry — Error Tracking ===
# DSN vazio desabilita o Sentry silenciosamente (no-op). Configure SENTRY_DSN_BACKEND no Railway para ativar.
sentry.dsn=${SENTRY_DSN_BACKEND:}
# Nunca enviar PII (tokens, senhas, CPF) para o Sentry
sentry.send-default-pii=false
# Ambiente derivado do Spring profile ativo
sentry.environment=${SPRING_PROFILES_ACTIVE:local}
# Sample de 10% das transações para trace (performance monitoring)
sentry.traces-sample-rate=0.1
# Captura apenas excecoes de nivel ERROR ou acima
sentry.exception-resolver-order=-2147483647

# === Resilience4j — Retry ===
# MailerSend: 3 tentativas com backoff exponencial (2s, 4s, 8s)
resilience4j.retry.instances.mailersend.max-attempts=3
resilience4j.retry.instances.mailersend.wait-duration=2s
resilience4j.retry.instances.mailersend.enable-exponential-backoff=true
resilience4j.retry.instances.mailersend.exponential-backoff-multiplier=2
