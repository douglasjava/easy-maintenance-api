# ===== Integration test profile =====
# TestContainers @ServiceConnection injects spring.datasource.* automatically.

easy.jwt.secret=integration-test-secret-key-that-is-long-enough-for-hmac256-signing

# Flyway runs all migrations against the test container
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# External services — stubbed so context starts without real credentials
firebase.service.account=
sentry.dsn=
aws.accessKeyId=test-access-key
aws.secretAccessKey=test-secret-key
aws.region=us-east-1

# Spring AI — fake key; context starts but calls would fail (never made in these tests)
spring.ai.openai.api-key=test-disabled

# Mail — context starts but sending would fail; caught by business layer
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

logging.level.root=WARN
logging.level.com.brainbyte=INFO
logging.level.org.testcontainers=WARN

# Rate limiting — reduced capacity so tests exhaust buckets in 2 requests (3rd → 429)
# Long refill period prevents accidental refill during the test run
rate-limit.limits.login.capacity=2
rate-limit.limits.login.refill-period-seconds=3600
rate-limit.limits.login.key=IP
rate-limit.limits.forgot-password.capacity=2
rate-limit.limits.forgot-password.refill-period-seconds=3600
rate-limit.limits.forgot-password.key=IP
